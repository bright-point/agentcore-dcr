AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS BedrockAgentCore Dynamic Client Registration (DCR)

  Deploys OAuth 2.1 Dynamic Client Registration infrastructure for AWS
  BedrockAgentCore Gateway with Cognito. Enables auto-registration for
  OAuth 2.1 clients including Claude Code MCP, custom applications, and
  multi-tenant systems.

Parameters:
  ResourcePrefix:
    Type: String
    Default: mcp
    Description: Prefix for all resource names

  CognitoUserPoolId:
    Type: String
    Description: Existing Cognito User Pool ID

  CognitoUserPoolArn:
    Type: String
    Description: Existing Cognito User Pool ARN

  CognitoDomain:
    Type: String
    Description: Cognito domain (without https://)

  KnowledgeBaseId:
    Type: String
    Description: ID of your existing Bedrock Managed Knowledge Base (e.g. 10SEIXTFFF)

  KnowledgeBaseArn:
    Type: String
    Description: ARN of your Bedrock Knowledge Base (arn:aws:bedrock:REGION:ACCOUNT:knowledge-base/KB_ID)

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12

Resources:
  # =============================================================================
  # OAuth Metadata API
  # Serves OIDC discovery endpoints and Dynamic Client Registration
  # =============================================================================

  OAuthMetadataApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ResourcePrefix}-oauth-metadata'
      Description: OAuth 2.1 metadata and DCR endpoints for BedrockAgentCore Gateway
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /.well-known resource
  WellKnownResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ParentId: !GetAtt OAuthMetadataApi.RootResourceId
      PathPart: '.well-known'

  # /.well-known/openid-configuration resource
  OIDCConfigResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ParentId: !Ref WellKnownResource
      PathPart: 'openid-configuration'

  # GET /.well-known/openid-configuration
  # Returns OAuth/OIDC server metadata including registration_endpoint
  OIDCConfigMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ResourceId: !Ref OIDCConfigResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: !Sub |
                {
                  "issuer": "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}",
                  "authorization_endpoint": "https://${CognitoDomain}/oauth2/authorize",
                  "token_endpoint": "https://${CognitoDomain}/oauth2/token",
                  "userinfo_endpoint": "https://${CognitoDomain}/oauth2/userInfo",
                  "revocation_endpoint": "https://${CognitoDomain}/oauth2/revoke",
                  "jwks_uri": "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}/.well-known/jwks.json",
                  "registration_endpoint": "https://${OAuthMetadataApi}.execute-api.${AWS::Region}.amazonaws.com/prod/register",
                  "scopes_supported": ["openid", "email", "profile"],
                  "response_types_supported": ["code", "token"],
                  "grant_types_supported": ["authorization_code", "refresh_token"],
                  "subject_types_supported": ["public"],
                  "id_token_signing_alg_values_supported": ["RS256"],
                  "token_endpoint_auth_methods_supported": ["client_secret_basic", "client_secret_post"],
                  "code_challenge_methods_supported": ["S256"]
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
            method.response.header.Access-Control-Allow-Origin: true

  # =============================================================================
  # Dynamic Client Registration (DCR)
  # =============================================================================

  # /register resource
  RegisterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ParentId: !GetAtt OAuthMetadataApi.RootResourceId
      PathPart: 'register'

  # DCR Lambda execution role
  DCRLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ResourcePrefix}-dcr-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DCRPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                Resource: !Ref CognitoUserPoolArn
              - Effect: Allow
                Action:
                  - bedrock-agentcore:ListGateways
                  - bedrock-agentcore:GetGateway
                  - bedrock-agentcore:UpdateGateway
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt AgentCoreGatewayRole.Arn

  # DCR Lambda function
  DCRLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ResourcePrefix}-dcr'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DCRLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          USER_POOL_ID: !Ref CognitoUserPoolId
          GATEWAY_NAME: !Sub '${ResourcePrefix}-mcp-gateway'
          RESOURCE_PREFIX: !Ref ResourcePrefix
      Code:
        ZipFile: |
          import json
          import os
          import re
          import boto3
          import uuid
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client('cognito-idp')
          agentcore = boto3.client('bedrock-agentcore-control')

          def find_gateway_by_name(name):
              """Find gateway ID by name to avoid circular CloudFormation dependency"""
              try:
                  paginator = agentcore.get_paginator('list_gateways')
                  for page in paginator.paginate():
                      # IMPORTANT: API returns 'items', not 'gateways'
                      for gw in page.get('items', []):
                          if gw.get('name') == name:
                              return gw.get('gatewayId')
              except Exception as e:
                  logger.error(f"Failed to find gateway: {e}")
              return None

          def handler(event, context):
              logger.info(f"DCR request: {json.dumps(event)}")

              # Parse request body
              try:
                  body = json.loads(event.get('body', '{}'))
              except json.JSONDecodeError:
                  return response(400, {'error': 'invalid_request', 'error_description': 'Invalid JSON body'})

              # Extract client metadata
              raw_client_name = body.get('client_name', f"dcr-client-{uuid.uuid4().hex[:8]}")

              # CRITICAL: Sanitize client name
              # Cognito only allows [\w\s+=,.@-]+
              # Claude Code sends names like "Claude Code (server-name)" which contain parentheses
              client_name = re.sub(r'[^\w\s+=,.@-]', '-', raw_client_name)

              redirect_uris = body.get('redirect_uris', ['http://127.0.0.1:33418', 'http://localhost:33418'])

              # Validate redirect URIs
              if not isinstance(redirect_uris, list) or not redirect_uris:
                  return response(400, {'error': 'invalid_redirect_uri', 'error_description': 'redirect_uris must be a non-empty array'})

              user_pool_id = os.environ['USER_POOL_ID']
              gateway_name = os.environ['GATEWAY_NAME']
              prefix = os.environ['RESOURCE_PREFIX']

              try:
                  # Create Cognito client with OAuth configuration
                  client_response = cognito.create_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientName=client_name,
                      GenerateSecret=True,
                      ExplicitAuthFlows=['ALLOW_USER_SRP_AUTH', 'ALLOW_REFRESH_TOKEN_AUTH'],
                      AllowedOAuthFlows=['code'],
                      AllowedOAuthScopes=['email', 'openid', 'profile'],
                      AllowedOAuthFlowsUserPoolClient=True,
                      CallbackURLs=redirect_uris,
                      SupportedIdentityProviders=['Google']
                  )

                  client_id = client_response['UserPoolClient']['ClientId']
                  client_secret = client_response['UserPoolClient']['ClientSecret']

                  logger.info(f"Created Cognito client: {client_id} (name: {client_name})")

                  # Add client to gateway AllowedClients
                  gateway_id = find_gateway_by_name(gateway_name)
                  if gateway_id:
                      try:
                          gateway = agentcore.get_gateway(gatewayIdentifier=gateway_id)

                          current_clients = gateway.get('authorizerConfiguration', {}).get('customJWTAuthorizer', {}).get('allowedClients', [])
                          updated_clients = list(set(current_clients + [client_id]))

                          agentcore.update_gateway(
                              gatewayIdentifier=gateway_id,
                              name=gateway['name'],
                              roleArn=gateway['roleArn'],
                              protocolType=gateway['protocolType'],
                              authorizerType=gateway['authorizerType'],
                              authorizerConfiguration={
                                  'customJWTAuthorizer': {
                                      'discoveryUrl': gateway['authorizerConfiguration']['customJWTAuthorizer']['discoveryUrl'],
                                      'allowedClients': updated_clients
                                  }
                              }
                          )
                          logger.info(f"Added client {client_id} to gateway AllowedClients")
                      except Exception as e:
                          logger.error(f"Failed to update gateway: {e}")
                          # Don't fail the request - client is created, just needs manual gateway update
                  else:
                      logger.warning(f"Gateway '{gateway_name}' not found - client created but not added to AllowedClients")

                  # Return RFC 7591 compliant response
                  return response(201, {
                      'client_id': client_id,
                      'client_secret': client_secret,
                      'client_name': client_name,
                      'redirect_uris': redirect_uris,
                      'token_endpoint_auth_method': 'client_secret_basic',
                      'grant_types': ['authorization_code', 'refresh_token'],
                      'response_types': ['code']
                  })

              except cognito.exceptions.InvalidParameterException as e:
                  logger.error(f"Invalid parameter: {e}")
                  return response(400, {'error': 'invalid_request', 'error_description': str(e)})
              except Exception as e:
                  logger.error(f"DCR failed: {e}")
                  return response(500, {'error': 'server_error', 'error_description': 'Client registration failed'})

          def response(status_code, body):
              return {
                  'statusCode': status_code,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*',
                      'Access-Control-Allow-Headers': 'Content-Type',
                      'Access-Control-Allow-Methods': 'POST, OPTIONS'
                  },
                  'body': json.dumps(body)
              }

  # Lambda permission for API Gateway
  DCRLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DCRLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OAuthMetadataApi}/*'

  # POST /register
  RegisterMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: DCRLambdaPermission
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ResourceId: !Ref RegisterResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DCRLambda.Arn}/invocations'
      MethodResponses:
        - StatusCode: '201'
        - StatusCode: '400'
        - StatusCode: '500'

  # OPTIONS /register (CORS)
  RegisterOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      ResourceId: !Ref RegisterResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

  # Deploy the OAuth API
  OAuthMetadataDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - OIDCConfigMethod
      - RegisterMethod
      - RegisterOptionsMethod
    Properties:
      RestApiId: !Ref OAuthMetadataApi

  OAuthMetadataStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref OAuthMetadataApi
      DeploymentId: !Ref OAuthMetadataDeployment
      StageName: prod

  # =============================================================================
  # BedrockAgentCore Gateway
  # =============================================================================

  # IAM Role for Gateway to invoke Lambda
  AgentCoreGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ResourcePrefix}-agentcore-gateway-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RetrieveFromKnowledgeBase
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: !Ref KnowledgeBaseArn

  # Initial Cognito client for manual registration (optional)
  InitialMCPClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ResourcePrefix}-initial-client'
      UserPoolId: !Ref CognitoUserPoolId
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - http://127.0.0.1:33418
        - http://localhost:33418
        - https://claude.ai/api/mcp/auth_callback
      SupportedIdentityProviders:
        - Google

  # MCP Gateway
  MCPGateway:
    Type: AWS::BedrockAgentCore::Gateway
    DependsOn:
      - AgentCoreGatewayRole
      - InitialMCPClient
      - OAuthMetadataStage
    Properties:
      Name: !Sub '${ResourcePrefix}-mcp-gateway'
      Description: MCP Gateway with OAuth DCR support
      ProtocolType: MCP
      AuthorizerType: CUSTOM_JWT
      RoleArn: !GetAtt AgentCoreGatewayRole.Arn
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          # Points to our OIDC endpoint which includes registration_endpoint
          DiscoveryUrl: !Sub 'https://${OAuthMetadataApi}.execute-api.${AWS::Region}.amazonaws.com/prod/.well-known/openid-configuration'
          AllowedClients:
            - !Ref InitialMCPClient
            # DCR Lambda adds additional clients dynamically

  # Gateway Target - Knowledge Base connector (Standard retrieval)
  MCPGatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: MCPGateway
    Properties:
      GatewayIdentifier: !Ref MCPGateway
      Name: !Sub '${ResourcePrefix}-kb-target'
      Description: Bedrock Knowledge Base target (Standard retrieval)
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
      TargetConfiguration:
        Mcp:
          Connector:
            Source:
              ConnectorId: bedrock-knowledge-bases
            Configurations:
              - Name: Retrieve
                ParameterValues:
                  knowledgeBaseId: !Ref KnowledgeBaseId

Outputs:
  GatewayUrl:
    Description: MCP Gateway URL for Claude Code
    Value: !Sub 'https://${MCPGateway}.gateway.bedrock-agentcore.${AWS::Region}.amazonaws.com/mcp'

  OAuthMetadataUrl:
    Description: OAuth metadata API URL
    Value: !Sub 'https://${OAuthMetadataApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  OIDCConfigUrl:
    Description: OIDC discovery endpoint
    Value: !Sub 'https://${OAuthMetadataApi}.execute-api.${AWS::Region}.amazonaws.com/prod/.well-known/openid-configuration'

  DCREndpoint:
    Description: Dynamic Client Registration endpoint
    Value: !Sub 'https://${OAuthMetadataApi}.execute-api.${AWS::Region}.amazonaws.com/prod/register'

  GatewayId:
    Description: Gateway ID for debugging
    Value: !Ref MCPGateway

  InitialClientId:
    Description: Initial Cognito client ID (for manual setup)
    Value: !Ref InitialMCPClient
